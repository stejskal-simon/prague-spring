          <div class="quote">"We live in a time when a person must think carefully before speaking the truth." — Milan Kundera</div>
          The 4th Congress of the Union of Czechoslovak Writers (1967) became an open confrontation with Party leadership. Reprisals paradoxically strengthened the reform movement.
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">Oct 1967</span><span class="event-title">Student Demonstrations</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">Students at Strahov protest power outages. Police crackdown triggers an avalanche.</div>
        <div class="event-detail"><div class="event-body">
          Students at the Strahov dormitories march by candlelight against recurring power failures. The <strong>brutal police response</strong> causes a scandal within the KSČ and strengthens the reform wing of the party.<br><br>
          Brezhnev visits Prague and sharply criticizes Novotný's leadership. Reform-minded communists around Alexander Dubček sense the moment has come. At the December KSČ plenum, a vote is held on removing Novotný as First Secretary.
        </div></div>
      </div>

    </div>
  </div>

  <!-- PHASE 2 -->
  <div class="phase-section spring" id="phase-spring">
    <div class="phase-header spring">
      <div class="phase-numeral">II.</div>
      <div>
        <div class="phase-title">Prague Spring</div>
        <div class="phase-period">January — August 1968</div>
      </div>
    </div>
    <div class="events-list spring-phase">

      <div class="event-item">
        <div class="event-row"><span class="event-date">5 Jan 1968</span><span class="event-title">Dubček Becomes First Secretary</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">Alexander Dubček replaces Novotný. The Spring can begin.</div>
        <div class="event-detail"><div class="event-body">
          <strong>Alexander Dubček</strong>, a Slovak communist with reformist views, becomes First Secretary of the KSČ. The public receives his election with enthusiasm — Dubček was perceived as a sincere man who genuinely wanted to change the system.
          <div class="quote">"Socialism with a human face" — the defining slogan of the Prague Spring</div>
          Dubček believed socialism could be reformed from within — remaining loyal to the USSR while building a more humane system. This faith would ultimately prove fatal.
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">Feb 1968</span><span class="event-title">Abolition of Press Censorship</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">For the first time since 1948, newspapers tell the truth. An explosion of free expression.</div>
        <div class="event-detail"><div class="event-body">
          The lifting of censorship was one of the most dramatic moments of the Spring. <strong>Newspapers, radio, and television</strong> began openly reporting on political trials, the secret police (StB), corruption, and the everyday lies of communist life.<br><br>
          Literární noviny, Mladý svět, Reporter — publications printed in runs that still couldn't keep up with demand. People argued over copies and read aloud in the streets.<br><br>
          The Soviet leadership watched the free press with mounting alarm — uncensored mass media was seen as a threat to the entire bloc.
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">5 Apr 1968</span><span class="event-title">The Action Programme</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">The reform blueprint — political pluralism, federalization, rehabilitation of victims.</div>
        <div class="event-detail"><div class="event-body">
          The <strong>Action Programme</strong> was a comprehensive reform document promising: rehabilitation of victims of political trials, federalization of Czechoslovakia, curbing the power of the StB, freedom to travel abroad, and gradual political pluralization.<br><br>
          The programme was revolutionary by the standards of the communist bloc — nowhere else had the party's leading role been challenged so openly. Moscow read it as a direct provocation.
          <div class="quote">"The Programme does not mean we are surrendering the Party's leading role — it means we must deserve it." — Alexander Dubček</div>
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">Spring 1968</span><span class="event-title">Euphoria — Civil Society Awakens</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">Public debates, new associations, petitions. Society comes alive after twenty years of silence.</div>
        <div class="event-detail"><div class="event-body">
          The Spring of 1968 was unique: a spontaneous revival of civil society that had not existed for twenty years. New clubs, associations, and debate forums sprang up. People were no longer afraid to speak openly.<br><br>
          The <strong>Club of Committed Non-Party Members (KAN)</strong> and <strong>K-231</strong> (an association of political prisoners) represented forces outside the KSČ. Their very existence was revolutionary.
          <div class="quote">"Two Thousand Words" — Ludvík Vaculík's manifesto (27 June 1968) called for accelerating the reforms and was signed by 70,000 people.</div>
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">Jun–Jul 1968</span><span class="event-title">Soviet Pressure — Warning Signs</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">Moscow escalates its demands. Warsaw Pact military exercises on Czechoslovak soil drag on.</div>
        <div class="event-detail"><div class="event-body">
          The Soviet Union under <strong>Leonid Brezhnev</strong> watched developments with growing alarm:<br><br>
          — June: Warsaw Pact exercises on Czechoslovak territory are extended — troops do not leave.<br>
          — July: The Čierna nad Tisou meeting — Dubček promises reforms will not exceed a "socialist framework."<br>
          — Bratislava Declaration (3 August): formal reassurances — but in Moscow, the decision has already been made.<br><br>
          Dubček and the reform leadership believed the Soviets would not intervene militarily. It was a fatal miscalculation.
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">20–21 Aug 1968</span><span class="event-title">The Invasion — End of the Spring</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">500,000 troops from five countries cross the border. Tanks in Prague. The Spring is over.</div>
        <div class="event-detail"><div class="event-body">
          On the night of 20–21 August 1968, the forces of the <strong>USSR, Poland, Hungary, Bulgaria, and East Germany</strong> entered Czechoslovakia. Operation "Danube" — the largest military operation in Europe since World War II.<br><br>
          <strong>500,000 troops, over 6,300 tanks, and 800 aircraft.</strong> Prague awoke to the rumble of engines. Tanks occupied Wenceslas Square, the Radio building, and central government institutions.<br><br>
          People poured into the streets, surrounding tanks, arguing with soldiers. Passive resistance — but to no avail.
          <div class="quote">"We came to save you." — written on a Soviet tank. Prague residents replied: "From whom?"</div>
          Dubček and the leadership were arrested and flown to Moscow. President Svoboda refused to sign any document legitimizing the invasion without their presence.
        </div></div>
      </div>

    </div>
  </div>

  <!-- PHASE 3 -->
  <div class="phase-section after" id="phase-after">
    <div class="phase-header after">
      <div class="phase-numeral">III.</div>
      <div>
        <div class="phase-title">Normalization &amp; Legacy</div>
        <div class="phase-period">1968 — 1989</div>
      </div>
    </div>
    <div class="events-list after-phase">

      <div class="event-item">
        <div class="event-row"><span class="event-date">Aug–Sep 1968</span><span class="event-title">The Moscow Protocol — Capitulation</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">Dubček signs the terms. Reforms will be rolled back. Soviet troops will stay "temporarily."</div>
        <div class="event-detail"><div class="event-body">
          Dubček and the other leaders were subjected to intense psychological pressure in Moscow. The <strong>Moscow Protocol</strong> (26 August) legalized Soviet troops and bound the KSČ to pursue "normalization."<br><br>
          Dubček returned to Prague a broken man. In a radio broadcast, he spoke through tears — he could not even read out the full text of the protocol. The nation understood.
          <div class="quote">"Friends, trust me... it was difficult..." — Alexander Dubček, radio address, 27 August 1968</div>
          Soviet troops remained. "Temporarily" meant 23 years — until 1991.
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">16 Jan 1969</span><span class="event-title">Jan Palach — The Human Torch</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">A philosophy student sets himself on fire on Wenceslas Square in protest against the nation's resignation.</div>
        <div class="event-detail"><div class="event-body">
          <strong>Jan Palach</strong>, a 20-year-old philosophy student, doused himself in petrol and set himself alight on the steps of the National Museum on 16 January 1969. He died on 19 January from his burns.<br><br>
          Palach's act protested the passivity spreading through society after August. He demanded an end to censorship and the cessation of Soviet propaganda newspapers.
          <div class="quote">"I have decided to become torch number 1." — Jan Palach, letter</div>
          Hundreds of thousands attended his funeral — the last mass act of public resistance. In February, Jan Zajíc followed his example.
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">Apr 1969</span><span class="event-title">Husák Replaces Dubček</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">Gustáv Husák — himself a victim of Stalinist trials — accepts the role of normalization's enforcer.</div>
        <div class="event-detail"><div class="event-body">
          Following the Ice Hockey World Championship (Czechoslovakia defeated the USSR — street celebrations became a pretext for crackdown), <strong>Dubček was removed</strong> and replaced by <strong>Gustáv Husák</strong>.<br><br>
          Husák was a paradoxical figure — condemned in the 1950s as a "bourgeois nationalist," a participant in the Prague Spring, and now the instrument of normalization.<br><br>
          Dubček was dispatched as ambassador to Turkey, then expelled from the Party and spent years working as a forestry official in Bratislava.
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">1970–1971</span><span class="event-title">The Purges — 500,000 Expelled</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">Party screenings, mass dismissals, the death of free culture. The brain drain begins.</div>
        <div class="event-detail"><div class="event-body">
          The normalization screenings devastated hundreds of thousands of lives. <strong>500,000 KSČ members were expelled or struck off the rolls.</strong> Those affected lost their jobs — doctors became boiler stokers, engineers became security guards, journalists became manual labourers.<br><br>
          Approximately <strong>300,000 Czechoslovaks emigrated</strong> — a catastrophic brain drain in science, culture, and economy. Milan Kundera, Miloš Forman, and many others departed.<br><br>
          Free culture died in public — in its place came the grey zone of samizdat and underground art. The Plastic People trial (1976) inspired Charter 77.
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">Jan 1977</span><span class="event-title">Charter 77</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">Havel, Patočka, Hájek and hundreds of others sign a document demanding respect for human rights.</div>
        <div class="event-detail"><div class="event-body">
          <strong>Charter 77</strong> was born in response to the Plastic People trial and became a symbol of moral resistance. Václav Havel, Jan Patočka, Jiří Hájek, and hundreds of others signed a document reminding the government of its Helsinki Accord obligations.
          <div class="quote">"Charter 77 is not an opposition party — it is a loose, informal and open community of people." — Charter 77 preamble</div>
          Signatories faced harassment, interrogations, and travel bans. Philosopher <strong>Jan Patočka</strong> died after exhausting StB interrogations (1977). Havel spent years in prison.
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">Nov 1989</span><span class="event-title">The Velvet Revolution — The End</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">21 years after August, communism falls. Dubček and Havel on the balcony together.</div>
        <div class="event-detail"><div class="event-body">
          On 17 November 1989, police violently dispersed a student demonstration on Národní třída. That spark ignited the revolution. Within days, hundreds of thousands were gathering on Wenceslas Square.<br><br>
          <strong>Alexander Dubček</strong> returned to public life after 21 years — his appearance on the Melantrich balcony alongside Václav Havel was a symbolic bridge between 1968 and 1989.
          <div class="quote">"Children, you have finished what we could not." — Alexander Dubček, Wenceslas Square, 1989</div>
          On 29 December 1989, <strong>Václav Havel was elected President</strong>. Communism fell without a single shot fired.
        </div></div>
      </div>

      <div class="event-item">
        <div class="event-row"><span class="event-date">Legacy</span><span class="event-title">What the Prague Spring Left Behind</span><span class="toggle-btn">+</span></div>
        <div class="event-teaser">A moral inheritance. It showed that socialism cannot be reformed — and that truth cannot be buried forever.</div>
        <div class="event-detail"><div class="event-body">
          <strong>For Czechoslovakia:</strong> It demonstrated that reform socialism was an illusion — the system could not be humanized from within. The lesson for Charter 77 and 1989: truth and democracy are inseparable.<br><br>
          <strong>For the world:</strong> "Socialism with a human face" inspired a generation of left-wing intellectuals in the West. Its defeat permanently disillusioned many from Soviet Marxism.<br><br>
          <strong>The Brezhnev Doctrine</strong> — the USSR's claimed right to militarily intervene in "fraternal" countries — persisted until Gorbachev. Its abandonment helped trigger the collapse of communism across the entire bloc in 1989.<br><br>
          <strong>Federalization</strong> (1969) — the one reform that survived — created the Czech and Slovak federation, a precursor to the peaceful dissolution of Czechoslovakia in 1993.
        </div></div>
      </div>

    </div>
  </div>

</div>

  class PragueTimeline extends HTMLElement {
    connectedCallback() {
      const shadow = this.attachShadow({ mode: 'open' });

      // Google Fonts link (must be in shadow root for it to load)
      const fontLink = document.createElement('link');
      fontLink.rel = 'stylesheet';
      fontLink.href = 'https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap';
      shadow.appendChild(fontLink);

      const style = document.createElement('style');
      style.textContent = CSS;
      shadow.appendChild(style);

      const wrapper = document.createElement('div');
      wrapper.className = 'shadow-root-wrap';
      wrapper.innerHTML = HTML;
      shadow.appendChild(wrapper);

      // Wire up JS — scoped to shadow root
      const root = shadow;

      // Phase nav buttons
      root.querySelectorAll('.phase-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const phase = btn.classList.contains('before') ? 'before'
                      : btn.classList.contains('spring') ? 'spring' : 'after';
          root.querySelectorAll('.phase-section').forEach(el => el.classList.remove('active'));
          root.querySelectorAll('.phase-btn').forEach(el => el.classList.remove('active'));
          root.querySelector('#phase-' + phase).classList.add('active');
          btn.classList.add('active');
        });
      });

      // Event items
      root.querySelectorAll('.event-item').forEach(item => {
        item.removeAttribute('onclick');
        item.addEventListener('click', () => {
          const isOpen = item.classList.contains('open');
          item.closest('.events-list').querySelectorAll('.event-item').forEach(e => e.classList.remove('open'));
          if (!isOpen) item.classList.add('open');
        });
      });

      // Sources toggle
      const sourcesBtn = root.querySelector('.sources-btn');
      if (sourcesBtn) {
        sourcesBtn.removeAttribute('onclick');
        sourcesBtn.addEventListener('click', () => {
          const body = root.querySelector('#sources-body');
          const open = body.classList.toggle('open');
          sourcesBtn.classList.toggle('open', open);
        });
      }
    }
  }

  customElements.define('prague-timeline', PragueTimeline);
})();
</script>
